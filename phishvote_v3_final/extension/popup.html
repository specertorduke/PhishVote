<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PhishVote</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap');
:root {
  --bg:      #090b11;
  --s1:      #10131c;
  --s2:      #161a26;
  --s3:      #1d2130;
  --b1:      #1e2438;
  --b2:      #252d45;
  --t1:      #dde4f5;
  --t2:      #8892aa;
  --t3:      #4e5875;
  --blue:    #4d8ef5;
  --blue2:   #7fb3ff;
  --green:   #2ecc71;
  --yellow:  #f5c518;
  --orange:  #f39c12;
  --red:     #e74c3c;
  --red2:    #c0392b;
  --mono:    'JetBrains Mono', monospace;
  --sans:    'Inter', sans-serif;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  width:380px; font-family:var(--sans);
  background:var(--bg); color:var(--t1);
  min-height:160px;
}

/* ── HEADER ── */
.header{
  display:flex; align-items:center; gap:10px;
  padding:11px 14px 10px;
  background:linear-gradient(135deg,#0c1020,#111525);
  border-bottom:1px solid var(--b1);
}
.logo{
  width:32px; height:32px; border-radius:8px; flex-shrink:0;
  background:linear-gradient(135deg,#2563eb,#1a8a4a);
  display:flex; align-items:center; justify-content:center;
  font-size:16px;
  box-shadow:0 0 12px rgba(37,99,235,0.4);
}
.hdr-title{ font-size:14px; font-weight:700; color:#fff; letter-spacing:.3px; }
.hdr-sub{ font-size:9px; color:var(--t3); margin-top:1px; }
.hdr-badge{
  margin-left:auto;
  background:#0d2040; color:var(--blue2);
  font-size:8.5px; font-family:var(--mono); font-weight:600;
  padding:3px 8px; border-radius:10px;
  border:1px solid #1e3a60;
}

/* ── URL BAR ── */
.url-bar{
  display:flex; align-items:flex-start; gap:7px;
  background:var(--s1); border-bottom:1px solid var(--b1);
  padding:7px 14px;
}
.url-tag{
  font-size:7.5px; color:var(--t3); text-transform:uppercase;
  letter-spacing:1.2px; margin-top:2px; flex-shrink:0;
}
.url-val{
  font-family:var(--mono); font-size:9.5px; color:#8ba4c8;
  word-break:break-all; line-height:1.5; max-height:30px; overflow:hidden;
}

/* ── DOM STATUS ── */
.dom-status{
  font-size:9px; font-family:var(--mono);
  padding:4px 14px; text-align:center;
}
.dom-status.pending{ background:#111a2a; color:var(--t3); }
.dom-status.ok     { background:#0d1f12; color:#4ade80; }
.dom-status.warn   { background:#1f1200; color:var(--orange); }

/* ── RESULT ── */
.result-wrap{
  padding:14px 14px 10px;
  border-bottom:1px solid var(--b1);
  text-align:center;
}
.risk-badge{
  display:inline-flex; align-items:center; gap:7px;
  padding:7px 20px; border-radius:22px;
  font-size:13px; font-weight:700; letter-spacing:.5px;
  border:1.5px solid; margin-bottom:10px;
}
.risk-badge.safe       { background:#0c2318; border-color:#2ecc71; color:#2ecc71; }
.risk-badge.likely-safe{ background:#142205; border-color:#8bc34a; color:#8bc34a; }
.risk-badge.suspicious { background:#231500; border-color:#f39c12; color:#f39c12; }
.risk-badge.phishing   { background:#230606; border-color:#e74c3c; color:#e74c3c; }
.risk-badge.high-risk  { background:#2d0000; border-color:#ff3b3b; color:#ff6060; }

.prob-row{
  display:flex; align-items:center; justify-content:center;
  gap:9px; margin-bottom:6px;
}
.prob-lbl{ font-size:9.5px; color:var(--t3); }
.prob-track{
  width:140px; height:7px;
  background:var(--s3); border-radius:4px; overflow:hidden;
}
.prob-fill{ height:100%; border-radius:4px; transition:width .5s cubic-bezier(.4,0,.2,1); }
.prob-num { font-family:var(--mono); font-size:13px; font-weight:700; }

.signal-row{
  display:flex; align-items:center; justify-content:center;
  gap:8px; flex-wrap:wrap;
  font-family:var(--mono); font-size:8.5px; margin-top:2px;
}
.sig-p{ color:#ff7070; }
.sig-s{ color:#4ade80; }
.sig-n{ color:var(--t3); }
.sig-t{ color:var(--t3); opacity:.6; }
.model-info{
  color:var(--t3); font-size:8px;
  border-top:1px solid var(--b1); width:100%;
  padding-top:4px; margin-top:2px;
}


/* ── FEATURES ── */
.feats-section{ padding:8px 14px 10px; }
.feats-header{
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:7px;
}
.toggle-feats{
  background:none; border:none; cursor:pointer;
  font-size:8.5px; color:var(--blue); font-family:var(--sans);
}
.feat-list{ display:flex; flex-direction:column; gap:3px; }
.feat-row{
  display:flex; align-items:center; justify-content:space-between;
  background:var(--s2); border:1px solid var(--b1);
  border-radius:5px; padding:5px 8px;
  transition:opacity .2s;
}
.feat-left{ display:flex; align-items:center; gap:6px; flex:1; min-width:0; }
.feat-label{
  font-size:9.5px; color:var(--t2);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}

/* source badges */
.src{
  font-size:7px; font-family:var(--mono); font-weight:700;
  padding:1px 4px; border-radius:3px; flex-shrink:0;
  letter-spacing:.05em;
}
.src.dom{ background:#14103a; color:#9b8df8; border:1px solid #2a1f6a; }
.src.url{ background:#0b1e30; color:#5da8e8; border:1px solid #1a3a5c; }

/* value chips */
.chip, .chip-wait{
  font-family:var(--mono); font-size:9px; font-weight:700;
  padding:2px 6px; border-radius:4px; flex-shrink:0; white-space:nowrap;
}
.chip.p     { background:#2a0606; color:#ff6b6b; border:1px solid #5a1010; }
.chip.s     { background:#082015; color:#4ade80; border:1px solid #0f4025; }
.chip.n     { background:var(--s3); color:var(--t3); border:1px solid var(--b1); }
.chip-wait  { background:var(--s3); color:var(--t3); border:1px solid var(--b1); }

.no-feat{ font-size:10px; color:var(--t3); padding:8px 0; }

/* ── FOOTER ── */
.footer{
  display:flex; justify-content:space-between; align-items:center;
  padding:7px 14px;
  background:var(--s1); border-top:1px solid var(--b1);
}
.footer-txt{ font-size:8.5px; color:var(--t3); font-family:var(--mono); }
.btn-rescan{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:#fff; border:none; border-radius:5px;
  padding:5px 12px; font-size:10px; font-weight:600;
  cursor:pointer; letter-spacing:.2px; font-family:var(--sans);
}
.btn-rescan:hover{ opacity:.85; }

/* ── LOADING / ERROR ── */
.loading{
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:40px; gap:12px;
}
.spinner{
  width:28px; height:28px;
  border:2.5px solid var(--s3);
  border-top-color:var(--blue);
  border-radius:50%;
  animation:spin .75s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }
.loading p{ font-size:11px; color:var(--t3); }
.err{ padding:24px; text-align:center; color:var(--red); font-size:12px; line-height:1.7; }

/* ── MISC ── */
.model-warn{
  font-size:9px; color:var(--orange); background:#1f1200;
  border:1px solid #5a3200; border-radius:5px;
  padding:5px 10px; margin:6px 14px 0; text-align:center;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🛡️</div>
  <div>
    <div class="hdr-title">PhishVote</div>
    <div class="hdr-sub">Adaptive Ensemble · Capstone Research v3.0</div>
  </div>
  <div class="hdr-badge">UCI-2015 · 30 feat</div>
</div>

<div id="root">
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading models…</p>
  </div>
</div>

<script src="engine.js"></script>
<script src="popup.js"></script>
</body>
</html>
